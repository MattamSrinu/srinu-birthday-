<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Mama 🎉</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}
body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at top,#1f1c2c,#0f0c29,#000000);
    overflow:hidden;
    color:white;
}
.container{
    text-align:center;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    padding:40px 30px;
    border-radius:25px;
    box-shadow:0 0 40px rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.1);
    width:90%;
    max-width:500px;
    position:relative;
    z-index:2;
}
.hidden{display:none;}
#mamaPhoto{
    width:200px;
    height:200px;
    object-fit:cover;
    border-radius:50%;
    border:4px solid #00ffe7;
    margin-bottom:20px;
    box-shadow:0 0 30px #00ffe7;
    animation:float 3s ease-in-out infinite, glow 2s ease-in-out infinite alternate;
}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-15px);}}
@keyframes glow{from{box-shadow:0 0 20px #00ffe7;}to{box-shadow:0 0 40px #ff00ff;}}
.title{
    font-size:2rem;
    background:linear-gradient(90deg,#00ffe7,#ff00ff,#ffd700);
    background-size:300%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:shine 3s linear infinite, slideUp 1s ease forwards;
    opacity:0;
}
@keyframes shine{0%{background-position:0%;}100%{background-position:300%;}}
@keyframes slideUp{from{opacity:0; transform:translateY(40px);} to{opacity:1; transform:translateY(0);}}
button{
    margin-top:25px;
    padding:12px 24px;
    border:none;
    border-radius:50px;
    background:linear-gradient(90deg,#00ffe7,#ff00ff);
    color:white;
    font-size:1rem;
    cursor:pointer;
}
.message{margin-top:15px;font-size:1.2rem;min-height:30px;}
.cursor{display:inline-block;width:2px;background:white;margin-left:3px;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

.fallItem{position:fixed;top:-30px;animation:fall linear forwards;z-index:1;}
.star{width:14px;height:14px;background:#fff;clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);} 
.balloon{width:16px;height:22px;border-radius:50%;}
.paper{width:12px;height:12px;}
@keyframes fall{0%{transform:translateY(-30px) rotate(0);}100%{transform:translateY(110vh) rotate(360deg);}}

.dancers{
    position:absolute;
    top:50%;
    left:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    pointer-events:none;
}
.dancer{
    font-size:50px;
    animation:dance 1s infinite alternate ease-in-out;
}
@keyframes dance{
    from{transform:translateY(0) rotate(-10deg);} 
    to{transform:translateY(-20px) rotate(10deg);} 
}
</style>
</head>
<body>

<audio id="music" src="https://cdn.pixabay.com/download/audio/2023/03/01/audio_9d6a92b45c.mp3?filename=telugu-mass-beat-141695.mp3" loop></audio>

<div class="container">
    <div id="start">
        <h1 class="title">Tap to Celebrate 🎂</h1>
        <button onclick="celebrate()">Celebrate Now</button>
    </div>

    <div id="reveal" class="hidden">
        <div class="dancers">
            <div class="dancer">💃</div>
            <div class="dancer">🕺</div>
        </div>
        <img id="mamaPhoto" src="./WhatsApp Image 2026-02-28 at 12.11.29.jpeg">
        <h1 class="title">Happy Birthday Srinu Mama Garu 🎉</h1>
        <div class="message" id="typingText"></div>
    </div>
</div>

<script>
const message = "From my childhood till today, you have never been just my uncle… you have always been my best friend You stood with me in my fun moments, laughed with me like a friend, and in my confusing or difficult situations, you guided me like a true mentor.Whenever I didn’t know what to do, you were the one who showed me the right path without making me feel small. ❤️I wish you happiness, health, and success always.May this year bring you everything you truly deserve.Happy Birthday once again Mama ❤️";
let index = 0;

function celebrate(){
    document.getElementById('start').style.display='none';
    document.getElementById('reveal').classList.remove('hidden');
    document.getElementById('music').play();
    startFalling();
    typeMessage();
}

function typeMessage(){
    const textElement = document.getElementById('typingText');
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    textElement.appendChild(cursor);

    function typing(){
        if(index < message.length){
            textElement.insertBefore(document.createTextNode(message.charAt(index)), cursor);
            index++;
            setTimeout(typing, 40);
        }
    }
    typing();
}

function startFalling(){
    const types=['star','balloon','paper'];
    setInterval(()=>{
        let item=document.createElement('div');
        let type=types[Math.floor(Math.random()*types.length)];
        item.classList.add('fallItem',type);
        item.style.left=Math.random()*100+'vw';
        item.style.background=['#00ffe7','#ff00ff','#ffd700','#00ff88','#ff4d6d'][Math.floor(Math.random()*5)];
        item.style.animationDuration=(Math.random()*4+3)+'s';
        document.body.appendChild(item);
        setTimeout(()=>item.remove(),7000);
    },250);
}
</script>

</body>
</html>
